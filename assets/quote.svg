<svg width="900" height="180" viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card  { fill: #0A0A0A; stroke: #2A2A2A; stroke-width: 1; }
      .shadow{ fill: #FFD400; }
      .quote { font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 22px; fill: #FFFFFF; }
      .mark  { font-family: Georgia, serif; font-size: 60px; fill: #2A2A2A; }
      .name  { font-family: Arial, sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 1px; }
    </style>
  </defs>
  <rect width="900" height="180" fill="#000000"/>

  <rect x="12" y="12" width="876" height="156" class="shadow"/>
  <rect x="6" y="6" width="876" height="156" class="card"/>

  <text x="36" y="60" class="mark">&#8220;</text>

  <text x="60" y="66" class="quote">Programs must be written for people to read,</text>
  <text x="60" y="98" class="quote">and only incidentally for machines to execute.</text>

  <!-- Harold Abelson - yellow hard shadow highlight -->
  <text x="64" y="140" class="name" fill="#FFD400">— Harold Abelson</text>
  <text x="60" y="136" class="name" fill="#FFFFFF">— Harold Abelson</text>
</svg>
