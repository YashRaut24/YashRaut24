<svg width="900" height="90" viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .txt   { font-family: Arial, sans-serif; font-weight: 700; font-size: 20px; }
      .line  { stroke: #FFD400; stroke-width: 1.6; fill: none; }
      .node  { fill: #FFD400; }
    </style>
  </defs>
  <rect width="900" height="90" fill="#000000"/>
  <line x1="0" y1="0" x2="900" y2="0" stroke="#2A2A2A" stroke-width="1"/>

  <!-- small circuit decoration, left -->
  <path d="M20 45 h30 v-15 h20 v30 h20" class="line"/>
  <circle cx="20" cy="45" r="3" class="node"/>
  <circle cx="90" cy="60" r="3" class="node"/>

  <!-- text -->
  <text x="130" y="52" class="txt" fill="#FFFFFF">Always building the </text>
  <text x="322" y="52" class="txt" fill="#FFD400">future</text>
  <text x="318" y="48" class="txt" fill="#FFFFFF">future</text>

  <!-- small circuit decoration, right -->
  <path d="M850 45 h-30 v-15 h-20 v30 h-20" class="line"/>
  <circle cx="850" cy="45" r="3" class="node"/>
  <circle cx="780" cy="60" r="3" class="node"/>
</svg>
