<svg width="900" height="150" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .card  { fill: #0A0A0A; stroke: #2A2A2A; stroke-width: 1; }
      .shadow{ fill: #FFD400; }
      .title { font-family: Arial, sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 1.5px; fill: #FFFFFF; }
      .sub   { font-family: Arial, sans-serif; font-weight: 400; font-size: 11.5px; fill: #B8B8B8; }
      .icon  { fill: none; stroke: #FFD400; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="900" height="150" fill="#000000"/>

  <!-- Card 1: DEVELOPER -->
  <rect x="12" y="12" width="280" height="126" class="shadow"/>
  <rect x="6" y="6" width="280" height="126" class="card"/>
  <!-- terminal icon -->
  <rect x="30" y="28" width="46" height="34" rx="3" class="icon"/>
  <path d="M38 40 L46 47 L38 54" class="icon"/>
  <line x1="50" y1="54" x2="64" y2="54" class="icon"/>
  <text x="90" y="46" class="title">DEVELOPER</text>
  <text x="30" y="90" class="sub">Writes clean, purposeful</text>
  <text x="30" y="106" class="sub">code that ships.</text>

  <!-- Card 2: PROBLEM SOLVER -->
  <rect x="312" y="12" width="280" height="126" class="shadow"/>
  <rect x="306" y="6" width="280" height="126" class="card"/>
  <!-- puzzle icon -->
  <circle cx="352" cy="44" r="19" class="icon"/>
  <line x1="352" y1="34" x2="352" y2="46" class="icon"/>
  <circle cx="352" cy="54" r="1.6" fill="#FFD400"/>
  <text x="390" y="46" class="title">PROBLEM SOLVER</text>
  <text x="330" y="90" class="sub">Breaks down complexity</text>
  <text x="330" y="106" class="sub">into working systems.</text>

  <!-- Card 3: BUILDER -->
  <rect x="612" y="12" width="280" height="126" class="shadow"/>
  <rect x="606" y="6" width="280" height="126" class="card"/>
  <!-- hammer/blocks icon -->
  <rect x="628" y="30" width="14" height="14" class="icon"/>
  <rect x="646" y="30" width="14" height="14" class="icon"/>
  <rect x="637" y="46" width="14" height="14" class="icon"/>
  <text x="690" y="46" class="title">BUILDER</text>
  <text x="630" y="90" class="sub">Ships full-stack products,</text>
  <text x="630" y="106" class="sub">not just prototypes.</text>
</svg>
