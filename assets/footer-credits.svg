<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="footerBg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="60%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="rocketTrail" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="footerTitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="footerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#footerBg)"/>

  <g fill="#e5e7eb">
    <circle cx="90" cy="40" r="1.3" opacity="0.7"/>
    <circle cx="220" cy="80" r="1" opacity="0.5"/>
    <circle cx="340" cy="30" r="1.5" opacity="0.7"/>
    <circle cx="1000" cy="50" r="1.3" opacity="0.7"/>
    <circle cx="1090" cy="100" r="1" opacity="0.5"/>
    <circle cx="960" cy="150" r="1.5" opacity="0.6"/>
    <circle cx="150" cy="180" r="1.2" opacity="0.6"/>
    <circle cx="1120" cy="200" r="1.4" opacity="0.7"/>
  </g>

  <!-- rocket leaving frame, trail beneath -->
  <g transform="translate(600,150) rotate(-25)">
    <path d="M0,0 L14,60 L0,80 L-14,60 Z" fill="url(#rocketTrail)"/>
    <path d="M0,-40 C10,-30 12,-10 8,10 L-8,10 C-12,-10 -10,-30 0,-40 Z" fill="#e5e7eb"/>
    <circle cx="0" cy="-10" r="4" fill="#3b82f6"/>
    <path d="M-8,5 L-20,20 L-8,20 Z" fill="#c4b5fd"/>
    <path d="M8,5 L20,20 L8,20 Z" fill="#c4b5fd"/>
  </g>

  <text x="600" y="230" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="600" fill="url(#footerTitle)" filter="url(#footerGlow)" letter-spacing="1">
    end of transmission — thanks for visiting
  </text>
</svg>
