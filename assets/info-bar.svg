<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .label { font-family: Arial, sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; fill: #FFD400; }
      .value { font-family: Arial, sans-serif; font-weight: 700; font-size: 17px; fill: #FFFFFF; }
      .sub   { font-family: Arial, sans-serif; font-weight: 400; font-size: 12px; fill: #B8B8B8; }
      .card  { fill: #0A0A0A; stroke: #2A2A2A; stroke-width: 1; }
      .shadow{ fill: #FFD400; }
    </style>
  </defs>
  <rect width="900" height="120" fill="#000000"/>

  <!-- Card template x offsets: 0, 230, 460, 690 ; width 210 -->

  <!-- LOCATION -->
  <rect x="12" y="12" width="210" height="96" class="shadow"/>
  <rect x="6" y="6" width="210" height="96" class="card"/>
  <text x="26" y="34" class="label">LOCATION</text>
  <text x="26" y="60" class="value">Mumbai, India</text>
  <text x="26" y="82" class="sub">Maharashtra</text>

  <!-- TIMEZONE -->
  <rect x="242" y="12" width="210" height="96" class="shadow"/>
  <rect x="236" y="6" width="210" height="96" class="card"/>
  <text x="256" y="34" class="label">TIMEZONE</text>
  <text x="256" y="60" class="value">Asia/Kolkata</text>
  <text x="256" y="82" class="sub">IST · UTC +05:30</text>

  <!-- FOCUS -->
  <rect x="472" y="12" width="210" height="96" class="shadow"/>
  <rect x="466" y="6" width="210" height="96" class="card"/>
  <text x="486" y="34" class="label">FOCUS</text>
  <text x="486" y="58" class="value">AI Engineering</text>
  <text x="486" y="80" class="sub">System Design · MERN</text>

  <!-- STATUS -->
  <rect x="702" y="12" width="192" height="96" class="shadow"/>
  <rect x="696" y="6" width="192" height="96" class="card"/>
  <text x="716" y="34" class="label">STATUS</text>
  <text x="716" y="60" class="value">Building</text>
  <text x="716" y="82" class="sub">in Public</text>
  <circle cx="850" cy="30" r="5" fill="#3FB950"/>
</svg>
