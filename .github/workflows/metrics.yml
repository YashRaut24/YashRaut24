name: generate github metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.YashR2405 }}
          filename: metrics.svg

          # --- theme: black / white / yellow, matches profile palette ---
          config_timezone: Asia/Kolkata
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8

          # base colors — background transparent so it sits on the black card
          config_display: large
          config_base: header, activity, community, repositories, metadata
